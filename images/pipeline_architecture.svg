<svg width="462" viewBox="177.50637817382812 39.06913757324219 392.3900451660156 648.0380401611328" xmlns="http://www.w3.org/2000/svg" role="img" height="763" style="">
  <title>AI News Agent — pipeline architecture</title>
  <desc>Vertical flowchart of the 8-node agent pipeline: Orchestrator, Scraper, Reader, Verifier, Validator with conditional retry edge back to Reader and continue edge to Formatter, Formatter, Delivery.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="600" fill="#2C2C2A">AI news agent — pipeline architecture</text>

  <rect x="270" y="48" width="140" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="65" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#2C2C2A">START</text>

  <line x1="340" y1="82" x2="340" y2="102" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="102" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="122" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#3C3489">Orchestrator</text>
  <text x="340" y="142" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#534AB7">pre-flight · sets run_meta</text>

  <line x1="340" y1="158" x2="340" y2="178" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="178" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="198" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#085041">Scraper</text>
  <text x="340" y="218" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#0F6E56">RSS feeds → article pages</text>

  <line x1="340" y1="234" x2="340" y2="254" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="254" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="274" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#633806">Reader</text>
  <text x="340" y="294" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#854F0B">ReAct loop: summarize + score</text>

  <line x1="340" y1="310" x2="340" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="330" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="350" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#712B13">Verifier</text>
  <text x="340" y="370" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#993C1D">Tavily web search · mark verified</text>

  <line x1="340" y1="386" x2="340" y2="406" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="406" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="426" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#3C3489">Validator</text>
  <text x="340" y="446" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#534AB7">quality check · route decision</text>

  <path d="M 450 434 L 525 434 L 525 282 L 450 282" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="532" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#534AB7">retry</text>
  <text x="532" y="368" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#534AB7">(max 2)</text>

  <line x1="340" y1="462" x2="340" y2="482" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="356" y="475" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#5F5E5A">continue</text>

  <rect x="230" y="482" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="502" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#085041">Formatter</text>
  <text x="340" y="522" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#0F6E56">builds HTML digest</text>

  <line x1="340" y1="538" x2="340" y2="558" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="558" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="578" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#085041">Delivery</text>
  <text x="340" y="598" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#0F6E56">archive + email subscribers</text>

  <line x1="340" y1="614" x2="340" y2="634" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="270" y="634" width="140" height="34" rx="17" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="651" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" fill="#2C2C2A">END</text>

  <text x="80" y="698" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#888780">Legend:</text>
  <rect x="80" y="708" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="95" y="718" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#5F5E5A">Orchestration / routing</text>
  <rect x="220" y="708" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="235" y="718" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#5F5E5A">Data processing</text>
  <rect x="350" y="708" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="365" y="718" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#5F5E5A">LLM inference</text>
  <rect x="465" y="708" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="480" y="718" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#5F5E5A">Verification</text>
</svg>