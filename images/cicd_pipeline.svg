<svg width="1065" viewBox="79.49058532714844 12.89118766784668 572.0464630126953 387.2727527618408" xmlns="http://www.w3.org/2000/svg" role="img" height="721" style="">
  <title>CI/CD pipeline</title>
  <desc>Flow diagram showing the automated deployment pipeline: code trigger fires GitHub Actions which builds and pushes a Docker image to Amazon ECR, then SSHes into EC2 to pull and restart the container.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="600" fill="#2C2C2A">CI/CD pipeline</text>

  <rect x="205" y="48" width="270" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#2C2C2A">Code trigger</text>
  <text x="340" y="88" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#5F5E5A">git push to main · workflow_dispatch</text>

  <line x1="340" y1="104" x2="340" y2="134" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="205" y="134" width="270" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="154" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#3C3489">GitHub Actions runner</text>
  <text x="340" y="174" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#534AB7">checkout · AWS auth · build · push</text>

  <line x1="475" y1="162" x2="505" y2="162" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="490" y="155" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#854F0B">push</text>

  <rect x="505" y="134" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="575" y="154" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#633806">Amazon ECR</text>
  <text x="575" y="174" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#854F0B">eu-north-1</text>

  <line x1="340" y1="190" x2="340" y2="240" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="356" y="218" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#5F5E5A">SSH deploy</text>

  <path d="M 575 190 L 575 268 L 475 268" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="582" y="232" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#854F0B">pull</text>

  <rect x="205" y="240" width="270" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#085041">EC2 instance</text>
  <text x="340" y="280" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#0F6E56">pull image · docker compose up -d</text>

  <line x1="340" y1="296" x2="340" y2="336" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="205" y="336" width="270" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="356" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#27500A">Service live</text>
  <text x="340" y="376" text-anchor="middle" dominant-baseline="central" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#3B6D11">http://13.60.236.70:8000</text>

  <text x="80" y="416" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#888780">Legend:</text>
  <rect x="80" y="420" width="10" height="0" rx="0"/>
  <text x="80" y="416" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#888780">Solid arrow = automated step · Dashed arrow = image pull from registry</text>
</svg>